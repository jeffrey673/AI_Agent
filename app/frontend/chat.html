<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#171717">
  <title>SKIN1004 AI</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css?v=111">
  <!-- Markdown + Code highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-theme">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (localStorage.theme === "light") {
      document.documentElement.classList.replace("dark", "light");
    }
  </script>
</head>
<body>
  <div class="chat-app">
    <!-- Mobile overlay -->
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Header: logo (clickable → home), brand, new-chat + collapse -->
      <div class="sidebar-header">
        <a href="#" class="sidebar-home-link" id="sidebar-home-link" title="홈으로">
          <img class="logo" id="sidebar-logo" src="/static/splash-dark-new.png" alt="SKIN1004">
          <span class="brand-gradient">SKIN1004 AI</span>
        </a>
        <div class="sidebar-header-actions">
          <button class="sidebar-icon-btn" id="btn-new-chat" title="새 대화">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button class="sidebar-icon-btn" id="btn-collapse-sidebar" title="사이드바 접기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="sidebar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="convo-search" placeholder="대화 검색...">
      </div>

      <!-- Conversation list (grouped by date) -->
      <div class="sidebar-conversations" id="convo-list"></div>

      <!-- Dashboard button -->
      <div class="sidebar-dashboard sidebar-bottom-btn">
        <button class="sidebar-dashboard-btn" id="btn-dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
      </div>

      <!-- System Status button (opens drawer) + inline indicator -->
      <div class="sidebar-dashboard sidebar-bottom-btn sidebar-status-wrap">
        <button class="sidebar-dashboard-btn" id="btn-system-status">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span>System Status</span>
          <div class="sidebar-status-inline" id="sidebar-status-inline"></div>
        </button>
      </div>

      <!-- Admin button (visible to admin only) -->
      <div class="sidebar-dashboard sidebar-bottom-btn" id="admin-btn-wrap" style="display:none">
        <button class="sidebar-dashboard-btn sidebar-admin-btn" id="btn-admin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Admin</span>
        </button>
      </div>

      <!-- User footer -->
      <div class="sidebar-footer">
        <div class="user-avatar" id="user-avatar">A</div>
        <span class="user-name" id="user-name"></span>
        <button class="sidebar-icon-btn" id="btn-change-pw" title="비밀번호 변경">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        <button class="sidebar-icon-btn" id="btn-logout" title="로그아웃">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Collapsed sidebar expand button -->
    <button class="sidebar-expand-btn" id="btn-expand-sidebar" style="display:none" title="사이드바 열기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>

    <!-- Main chat area -->
    <main class="chat-main">
      <!-- Top bar -->
      <div class="chat-topbar">
        <button class="menu-toggle" id="btn-menu" aria-label="Menu">&#9776;</button>
        <input type="hidden" id="model-select" value="skin1004-Analysis">
        <div class="topbar-spacer"></div>
        <button class="topbar-gws-btn" id="btn-gws-connect" title="Google 계정 연결">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span id="gws-connect-label">Google 연결</span>
        </button>
      </div>

      <!-- Scroll to bottom button -->
      <button class="scroll-to-bottom" id="btn-scroll-bottom" style="display:none" aria-label="Scroll to bottom">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <!-- Messages / Welcome -->
      <div class="chat-messages" id="chat-messages">
        <div class="chat-welcome" id="chat-welcome">
          <div class="welcome-greeting">
            <div class="welcome-first-line">
              <img class="welcome-logo" id="welcome-logo" src="/static/splash-dark-new.png" alt="">
              <h1 class="welcome-hello"><span id="welcome-user-name"></span>님,</h1>
            </div>
            <h1 class="welcome-sub">참 좋은날입니다 ⛅☁️</h1>
          </div>
          <div class="suggestions" id="welcome-suggestions">
            <button class="suggestion-chip" data-q="쇼피 인도네시아 이번 달 매출 알려줘">쇼피 인도네시아 매출</button>
            <button class="suggestion-chip" data-q="아마존 미국 이번 달 Top 10 제품 알려줘">아마존 미국 Top 10</button>
            <button class="suggestion-chip" data-q="2025년 TikTok 광고비 총액 알려줘">TikTok 광고비 현황</button>
            <button class="suggestion-chip" data-q="인플루언서 팀별 비용 비교해줘">인플루언서 비용 비교</button>
            <button class="suggestion-chip" data-q="Facebook ROAS 국가별 분석해줘">Facebook ROAS 분석</button>
            <button class="suggestion-chip" data-q="국가별 매출 순위 Top 10 알려줘">국가별 매출 순위</button>
            <button class="suggestion-chip" data-q="틱톡샵 접속 방법 알려줘">틱톡샵 접속 가이드</button>
            <button class="suggestion-chip" data-q="스마트스토어 운영 방법 알려줘">스마트스토어 운영</button>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="chat-input-area" id="chat-input-area">
        <!-- Source filter badge (shown when not all sources enabled) -->
        <div class="source-filter-badge" id="source-filter-badge" style="display:none"></div>
        <!-- // slash command dropdown -->
        <div class="slash-source-dropdown" id="slash-source-dropdown" style="display:none"></div>
        <!-- Follow-up suggestions (shown after AI response) -->
        <div class="followup-suggestions" id="followup-suggestions" style="display:none"></div>
        <!-- Image preview strip (shown when images are pending) -->
        <div class="image-preview-strip" id="image-preview-strip" style="display:none"></div>
        <div class="chat-input-wrapper">
          <button class="btn-attach" id="btn-attach" title="이미지 첨부" aria-label="Attach image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="file-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden>
          <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요..." autofocus></textarea>
          <button class="btn-send" id="btn-send" disabled aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Dashboard Drawer -->
  <div id="skin-dashboard-overlay" class="closed"></div>
  <div id="skin-dashboard-drawer" class="closed">
    <div class="drawer-header">
      <button class="drawer-close" id="drawer-close">&times;</button>
    </div>
    <iframe id="dashboard-iframe"></iframe>
  </div>

  <!-- System Status Drawer -->
  <div id="skin-status-overlay" class="closed"></div>
  <div id="skin-status-drawer" class="closed">
    <div class="drawer-header">
      <span class="drawer-title">SYSTEM STATUS</span>
      <button class="drawer-close" id="status-drawer-close">&times;</button>
    </div>
    <div class="status-drawer-body" id="status-items"></div>
  </div>

  <!-- Admin Drawer -->
  <div id="skin-admin-overlay" class="closed"></div>
  <div id="skin-admin-drawer" class="closed">
    <div class="drawer-header">
      <span class="drawer-title">USER MANAGEMENT</span>
      <button class="drawer-close" id="admin-drawer-close">&times;</button>
    </div>
    <!-- Stats bar -->
    <div class="admin-stats-bar" id="admin-stats-bar"></div>
    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="groups">그룹 관리</button>
      <button class="admin-tab" data-tab="users">AD 사용자</button>
    </div>
    <!-- Tab: Groups -->
    <div class="admin-tab-content active" id="tab-groups">
      <div class="admin-toolbar">
        <button class="admin-btn-primary" id="btn-create-group">+ 새 그룹</button>
        <button class="admin-btn-secondary" id="btn-sync-ad">AD 동기화</button>
      </div>
      <div class="admin-drawer-body" id="admin-group-list"></div>
    </div>
    <!-- Tab: AD Users -->
    <div class="admin-tab-content" id="tab-users">
      <div class="admin-toolbar">
        <select id="admin-dept-filter" class="admin-select">
          <option value="">전체 부서</option>
        </select>
        <select id="admin-group-filter" class="admin-select">
          <option value="">전체 그룹</option>
          <option value="unassigned">미배정</option>
        </select>
        <input type="text" id="admin-search" class="admin-input" placeholder="이름/이메일 검색">
      </div>
      <div class="admin-drawer-body" id="admin-user-list"></div>
    </div>
  </div>

  <!-- Theme Toggle -->
  <button id="skin-theme-toggle" aria-label="Toggle theme"></button>

  <script src="/frontend/chat.js?v=124"></script>
</body>
</html>
