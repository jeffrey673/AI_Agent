<script>
  // Inherit theme: query param > parent window > localStorage
  (function() {
    var theme = "dark";
    var params = new URLSearchParams(window.location.search);
    if (params.get("theme")) {
      theme = params.get("theme");
    } else {
      try {
        theme = window.parent.document.documentElement.classList.contains("light") ? "light" : "dark";
      } catch(e) {
        if (window.localStorage && localStorage.theme === "light") theme = "light";
      }
    }
    if (theme === "light") document.documentElement.classList.add("light");
  })();
</script>
<style>
:root {
  --db-bg: #0a0a0a;
  --db-surface: #0e0e0e;
  --db-surface2: #121212;
  --db-surface3: #151515;
  --db-border: #1a1a1a;
  --db-text: #e0e0e0;
  --db-text-title: #ccc;
  --db-text-dim: #555;
  --db-text-dimmer: #444;
  --db-text-dimmest: #333;
  --db-text-bright: #fff;
  --db-preview-bg: #111;
  --db-scroll-thumb: #222;
  --db-active-bg: #141410;
}
html.light {
  --db-bg: #ffffff;
  --db-surface: #f7f7f7;
  --db-surface2: #f0f0f0;
  --db-surface3: #eaeaea;
  --db-border: #e0e0e0;
  --db-text: #333333;
  --db-text-title: #444;
  --db-text-dim: #888;
  --db-text-dimmer: #999;
  --db-text-dimmest: #bbb;
  --db-text-bright: #111;
  --db-preview-bg: #fafafa;
  --db-scroll-thumb: #ccc;
  --db-active-bg: #fff8ec;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', -apple-system, sans-serif;
  background: var(--db-bg);
  color: var(--db-text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== Layout ===== */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 520px;
  min-width: 520px;
  background: var(--db-surface);
  border-right: 1px solid var(--db-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Category tabs */
.cat-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--db-border);
  flex-shrink: 0;
}
.cat-tab {
  flex: 1;
  padding: 14px 4px;
  font-size: 13px;
  font-weight: 700;
  color: var(--db-text-dim);
  text-align: center;
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  font-family: inherit;
  white-space: nowrap;
  transition: all 0.15s;
}
.cat-tab:hover { color: var(--db-text-dimmer); }
.cat-tab.active {
  color: #e89200;
  border-bottom-color: #e89200;
  background: var(--db-surface2);
}

/* Items list */
.items-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.items-list::-webkit-scrollbar { width: 4px; }
.items-list::-webkit-scrollbar-track { background: transparent; }
.items-list::-webkit-scrollbar-thumb { background: var(--db-scroll-thumb); border-radius: 4px; }

/* Section header in sidebar */
.sec-header {
  padding: 12px 16px 6px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--db-text-dimmer);
}

/* Item row */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.12s;
  border-left: 3px solid transparent;
  text-decoration: none;
  color: inherit;
}
.item:hover {
  background: var(--db-surface3);
}
.item.active {
  background: var(--db-active-bg);
  border-left-color: #e89200;
}
.item-icon {
  width: 40px;
  height: 40px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.item-text {
  flex: 1;
  min-width: 0;
}
.item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--db-text-title);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}
.item.active .item-title { color: #e89200; }
.item-desc {
  font-size: 11px;
  color: var(--db-text-dimmer);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  flex-shrink: 0;
  opacity: 0.7;
}
.badge-looker  { background: #1a237e33; color: #7986cb; }
.badge-sheets  { background: #0d652d33; color: #66bb6a; }
.badge-tableau { background: #e8710a33; color: #ffb74d; }
.badge-tool    { background: #6d28d933; color: #b39ddb; }
.badge-web     { background: #37415133; color: #9ca3af; }

/* Icon bg colors */
.ibg-looker  { background: #1a237e22; }
.ibg-sheets  { background: #0d652d22; }
.ibg-tableau { background: #e8710a22; }
.ibg-tool    { background: #6d28d922; }
.ibg-web     { background: #37415133; }

/* ===== Preview Area ===== */
.preview {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--db-bg);
  overflow: hidden;
}

/* Preview header */
.preview-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--db-surface);
  border-bottom: 1px solid var(--db-border);
  flex-shrink: 0;
  min-height: 46px;
}
.preview-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--db-text-bright);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.preview-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-newtab {
  background: #e89200;
  color: #000;
}
.btn-newtab:hover { background: #f0a020; }

/* Preview iframe */
.preview-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: var(--db-preview-bg);
}

/* Empty state */
.preview-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--db-text-dimmest);
}
.preview-empty-icon { font-size: 48px; opacity: 0.4; }
.preview-empty-text { font-size: 13px; font-weight: 500; }
.preview-empty-sub { font-size: 11px; color: var(--db-text-dimmest); }

/* Item count */
.item-count {
  padding: 10px 16px;
  font-size: 10px;
  color: var(--db-text-dimmest);
  border-top: 1px solid var(--db-border);
  flex-shrink: 0;
  text-align: center;
}

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 300px; min-width: 300px; }
}
@media (max-width: 700px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--db-border); }
  .preview { height: 55vh; }
}
</style>

// ===== State =====
var activeCat = 0;
var activeItemKey = null;
var catNames = Object.keys(DATA);

// ===== Render Category Tabs =====
var catTabsEl = document.getElementById("catTabs");
catNames.forEach(function(name, idx) {
  var btn = document.createElement("button");
  btn.className = "cat-tab" + (idx === 0 ? " active" : "");
  btn.textContent = name;
  btn.onclick = function() { selectCategory(idx); };
  catTabsEl.appendChild(btn);
});

function selectCategory(idx) {
  activeCat = idx;
  document.querySelectorAll(".cat-tab").forEach(function(t, i) {
    t.className = "cat-tab" + (i === idx ? " active" : "");
  });
  renderItems();
}

// ===== Render Items List =====
function renderItems() {
  var listEl = document.getElementById("itemsList");
  listEl.innerHTML = "";
  var catName = catNames[activeCat];
  var sections = DATA[catName];
  var totalCount = 0;

  Object.keys(sections).forEach(function(secName) {
    var items = sections[secName];
    totalCount += items.length;

    var h = document.createElement("div");
    h.className = "sec-header";
    h.textContent = secName + " (" + items.length + ")";
    listEl.appendChild(h);

    items.forEach(function(item) {
      var key = catName + "|" + secName + "|" + item.t;
      var row = document.createElement("div");
      row.className = "item" + (activeItemKey === key ? " active" : "");
      row.onclick = function() { selectItem(key, item); };

      var iconDiv = document.createElement("div");
      iconDiv.className = "item-icon ibg-" + item.type;
      iconDiv.textContent = item.icon;

      var textDiv = document.createElement("div");
      textDiv.className = "item-text";

      var title = document.createElement("div");
      title.className = "item-title";
      title.textContent = item.t;
      textDiv.appendChild(title);

      if (item.d) {
        var desc = document.createElement("div");
        desc.className = "item-desc";
        desc.textContent = item.d;
        textDiv.appendChild(desc);
      }

      var badge = document.createElement("span");
      badge.className = "item-badge badge-" + item.type;
      var typeLabels = { looker: "Looker", sheets: "Sheets", tableau: "Tableau", tool: "Tool", web: "Web" };
      badge.textContent = typeLabels[item.type] || item.type;

      row.appendChild(iconDiv);
      row.appendChild(textDiv);
      row.appendChild(badge);
      listEl.appendChild(row);
    });
  });

  document.getElementById("itemCount").textContent = totalCount + " items";
}

// ===== Select Item → Show Preview =====
function selectItem(key, item) {
  activeItemKey = key;

  // Update active state in sidebar
  document.querySelectorAll(".item").forEach(function(el) {
    el.classList.remove("active");
  });
  event.currentTarget.classList.add("active");

  var previewHeader = document.getElementById("previewHeader");
  var previewFrame = document.getElementById("previewFrame");
  var previewEmpty = document.getElementById("previewEmpty");

  previewHeader.style.display = "flex";
  previewFrame.style.display = "block";
  previewEmpty.style.display = "none";

  document.getElementById("previewTitle").textContent = item.icon + "  " + item.t;
  document.getElementById("btnNewTab").dataset.url = item.u;
  previewFrame.src = toEmbedUrl(item.u);
}

// Convert Looker Studio URLs to embed format for iframe
function toEmbedUrl(url) {
  // https://lookerstudio.google.com/reporting/... → .../embed/reporting/...
  // https://lookerstudio.google.com/u/0/reporting/... → .../embed/reporting/...
  return url.replace(
    /^(https:\/\/lookerstudio\.google\.com)(?:\/u\/\d+)?\/(reporting\/)/,
    "$1/embed/$2"
  );
}

// ===== Init =====
renderItems();

// Auto-select first item
var firstCat = catNames[0];
var firstSec = Object.keys(DATA[firstCat])[0];
var firstItem = DATA[firstCat][firstSec][0];
if (firstItem) {
  var firstKey = firstCat + "|" + firstSec + "|" + firstItem.t;
  activeItemKey = firstKey;
  renderItems();

  // Load first preview
  document.getElementById("previewHeader").style.display = "flex";
  document.getElementById("previewFrame").style.display = "block";
  document.getElementById("previewEmpty").style.display = "none";
  document.getElementById("previewTitle").textContent = firstItem.icon + "  " + firstItem.t;
  document.getElementById("btnNewTab").dataset.url = firstItem.u;
  document.getElementById("previewFrame").src = toEmbedUrl(firstItem.u);
}
