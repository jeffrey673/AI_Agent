<script>
  // Inherit theme: query param > parent window > localStorage
  (function() {
    var theme = "dark";
    var params = new URLSearchParams(window.location.search);
    if (params.get("theme")) {
      theme = params.get("theme");
    } else {
      try {
        theme = window.parent.document.documentElement.classList.contains("light") ? "light" : "dark";
      } catch(e) {
        if (window.localStorage && localStorage.theme === "light") theme = "light";
      }
    }
    if (theme === "light") document.documentElement.classList.add("light");
  })();
</script>
<style>
:root {
  --db-bg: #0a0a0a;
  --db-surface: #0e0e0e;
  --db-surface2: #121212;
  --db-surface3: #151515;
  --db-border: #1a1a1a;
  --db-text: #e0e0e0;
  --db-text-title: #ccc;
  --db-text-dim: #555;
  --db-text-dimmer: #444;
  --db-text-dimmest: #333;
  --db-text-bright: #fff;
  --db-preview-bg: #111;
  --db-scroll-thumb: #222;
  --db-active-bg: #141410;
}
html.light {
  --db-bg: #ffffff;
  --db-surface: #f7f7f7;
  --db-surface2: #f0f0f0;
  --db-surface3: #eaeaea;
  --db-border: #e0e0e0;
  --db-text: #333333;
  --db-text-title: #444;
  --db-text-dim: #888;
  --db-text-dimmer: #999;
  --db-text-dimmest: #bbb;
  --db-text-bright: #111;
  --db-preview-bg: #fafafa;
  --db-scroll-thumb: #ccc;
  --db-active-bg: #fff8ec;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', -apple-system, sans-serif;
  background: var(--db-bg);
  color: var(--db-text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== Layout ===== */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 520px;
  min-width: 520px;
  background: var(--db-surface);
  border-right: 1px solid var(--db-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Category tabs */
.cat-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--db-border);
  flex-shrink: 0;
}
.cat-tab {
  flex: 1;
  padding: 14px 4px;
  font-size: 13px;
  font-weight: 700;
  color: var(--db-text-dim);
  text-align: center;
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  font-family: inherit;
  white-space: nowrap;
  transition: all 0.15s;
}
.cat-tab:hover { color: var(--db-text-dimmer); }
.cat-tab.active {
  color: #e89200;
  border-bottom-color: #e89200;
  background: var(--db-surface2);
}

/* Items list */
.items-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.items-list::-webkit-scrollbar { width: 4px; }
.items-list::-webkit-scrollbar-track { background: transparent; }
.items-list::-webkit-scrollbar-thumb { background: var(--db-scroll-thumb); border-radius: 4px; }

/* Section header in sidebar */
.sec-header {
  padding: 12px 16px 6px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--db-text-dimmer);
}

/* Item row */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.12s;
  border-left: 3px solid transparent;
  text-decoration: none;
  color: inherit;
}
.item:hover {
  background: var(--db-surface3);
}
.item.active {
  background: var(--db-active-bg);
  border-left-color: #e89200;
}
.item-icon {
  width: 40px;
  height: 40px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.item-text {
  flex: 1;
  min-width: 0;
}
.item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--db-text-title);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}
.item.active .item-title { color: #e89200; }
.item-desc {
  font-size: 11px;
  color: var(--db-text-dimmer);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  flex-shrink: 0;
  opacity: 0.7;
}
.badge-looker  { background: #1a237e33; color: #7986cb; }
.badge-sheets  { background: #0d652d33; color: #66bb6a; }
.badge-tableau { background: #e8710a33; color: #ffb74d; }
.badge-tool    { background: #6d28d933; color: #b39ddb; }
.badge-web     { background: #37415133; color: #9ca3af; }
.badge-notion  { background: #9b59b633; color: #bb86fc; }

/* Icon bg colors */
.ibg-looker  { background: #1a237e22; color: #7986cb; }
.ibg-sheets  { background: #0d652d22; color: #66bb6a; }
.ibg-tableau { background: #e8710a22; color: #ffb74d; }
.ibg-tool    { background: #6d28d922; color: #b39ddb; }
.ibg-web     { background: #37415133; color: #9ca3af; }
.ibg-notion  { background: #9b59b622; color: #bb86fc; }
.item-icon svg { width: 20px; height: 20px; }

/* Loading spinner for preview */
.preview-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--db-preview-bg);
  z-index: 2;
}
.preview-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--db-border);
  border-top-color: #e89200;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Preview Area ===== */
.preview {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--db-bg);
  overflow: hidden;
}

/* Preview header */
.preview-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--db-surface);
  border-bottom: 1px solid var(--db-border);
  flex-shrink: 0;
  min-height: 46px;
}
.preview-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--db-text-bright);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.preview-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-newtab {
  background: #e89200;
  color: #000;
}
.btn-newtab:hover { background: #f0a020; }

/* Preview iframe */
.preview-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: var(--db-preview-bg);
}

/* Empty state */
.preview-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--db-text-dimmest);
}
.preview-empty-icon { font-size: 48px; opacity: 0.4; }
.preview-empty-text { font-size: 13px; font-weight: 500; }
.preview-empty-sub { font-size: 11px; color: var(--db-text-dimmest); }

/* Item count */
.item-count {
  padding: 10px 16px;
  font-size: 10px;
  color: var(--db-text-dimmest);
  border-top: 1px solid var(--db-border);
  flex-shrink: 0;
  text-align: center;
}

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 300px; min-width: 300px; }
}
@media (max-width: 700px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--db-border); }
  .preview { height: 55vh; }
}
</style>

// Map icon field values to SVG keys
var ICON_MAP = {
  "chart": "chart-bar", "chart-bar": "chart-bar",
  "chart-line": "chart-line", "dollar": "dollar", "users": "users",
  "cart": "cart", "store": "store", "search": "search", "phone": "phone",
  "star": "star", "people": "user", "doc": "doc", "flask": "product",
  "headset": "megaphone", "link": "link", "box": "package", "megaphone": "megaphone",
  "globe": "globe", "all": "target",
};

function getIconSvg(item) {
  // 1. Try icon field as SVG key
  if (ICON_SVGS[item.icon]) return ICON_SVGS[item.icon];
  // 2. Try mapped icon
  if (ICON_MAP[item.icon] && ICON_SVGS[ICON_MAP[item.icon]]) return ICON_SVGS[ICON_MAP[item.icon]];
  // 3. Fallback by type
  var typeFallback = { looker: "chart-bar", sheets: "table", tool: "tool", web: "globe", notion: "doc" };
  return ICON_SVGS[typeFallback[item.type]] || ICON_SVGS["chart-bar"];
}

// ===== State =====
var activeCat = 0;
var activeItemKey = null;
var catNames = Object.keys(DATA);

// ===== Render Category Tabs =====
var catTabsEl = document.getElementById("catTabs");
catNames.forEach(function(name, idx) {
  var btn = document.createElement("button");
  btn.className = "cat-tab" + (idx === 0 ? " active" : "");
  btn.textContent = name;
  btn.onclick = function() { selectCategory(idx); };
  catTabsEl.appendChild(btn);
});

function selectCategory(idx) {
  activeCat = idx;
  document.querySelectorAll(".cat-tab").forEach(function(t, i) {
    t.className = "cat-tab" + (i === idx ? " active" : "");
  });
  renderItems();
}

// ===== Render Items List =====
function renderItems() {
  var listEl = document.getElementById("itemsList");
  listEl.innerHTML = "";
  var catName = catNames[activeCat];
  var sections = DATA[catName];
  var totalCount = 0;

  Object.keys(sections).forEach(function(secName) {
    var items = sections[secName];
    totalCount += items.length;

    var h = document.createElement("div");
    h.className = "sec-header";
    h.textContent = secName + " (" + items.length + ")";
    listEl.appendChild(h);

    items.forEach(function(item) {
      var key = catName + "|" + secName + "|" + item.t;
      var row = document.createElement("div");
      row.className = "item" + (activeItemKey === key ? " active" : "");
      row.onclick = function() { cancelPreload(); selectItem(key, item); };
      row.onmouseenter = function() { preloadItem(key, item); };
      row.onmouseleave = function() { cancelPreload(); };

      var iconDiv = document.createElement("div");
      iconDiv.className = "item-icon ibg-" + item.type;
      iconDiv.innerHTML = getIconSvg(item);

      var textDiv = document.createElement("div");
      textDiv.className = "item-text";

      var title = document.createElement("div");
      title.className = "item-title";
      title.textContent = item.t;
      textDiv.appendChild(title);

      if (item.d) {
        var desc = document.createElement("div");
        desc.className = "item-desc";
        desc.textContent = item.d;
        textDiv.appendChild(desc);
      }

      var badge = document.createElement("span");
      badge.className = "item-badge badge-" + item.type;
      var typeLabels = { looker: "Looker", sheets: "Sheets", tableau: "Tableau", tool: "Tool", web: "Web", notion: "Notion" };
      badge.textContent = typeLabels[item.type] || item.type;

      row.appendChild(iconDiv);
      row.appendChild(textDiv);
      row.appendChild(badge);
      listEl.appendChild(row);
    });
  });

  document.getElementById("itemCount").textContent = totalCount + " items";
}

// ===== Iframe Cache Pool =====
var _iframeCache = {};  // key → {iframe, loaded}
var _activeIframeKey = null;
var MAX_CACHED = 8;     // Max cached iframes (prevent memory bloat)

function _getOrCreateIframe(key, url) {
  if (_iframeCache[key]) return _iframeCache[key];

  // Evict oldest if at capacity
  var keys = Object.keys(_iframeCache);
  if (keys.length >= MAX_CACHED) {
    var oldest = keys[0];
    _iframeCache[oldest].iframe.remove();
    delete _iframeCache[oldest];
  }

  var iframe = document.createElement("iframe");
  iframe.className = "preview-frame";
  iframe.style.cssText = "display:none;flex:1;border:none;width:100%;background:var(--db-preview-bg)";
  iframe.sandbox = "allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation";
  var entry = { iframe: iframe, loaded: false };
  iframe.onload = function() {
    entry.loaded = true;
    if (_activeIframeKey === key) {
      document.getElementById("previewLoading").style.display = "none";
    }
  };
  iframe.src = toEmbedUrl(url);
  document.getElementById("previewContainer").appendChild(iframe);
  _iframeCache[key] = entry;
  return entry;
}

// ===== Select Item → Show Preview =====
function selectItem(key, item) {
  activeItemKey = key;

  document.querySelectorAll(".item").forEach(function(el) {
    el.classList.remove("active");
  });
  event.currentTarget.classList.add("active");

  var previewHeader = document.getElementById("previewHeader");
  var previewEmpty = document.getElementById("previewEmpty");
  var previewLoading = document.getElementById("previewLoading");

  previewHeader.style.display = "flex";
  previewEmpty.style.display = "none";
  document.getElementById("previewTitle").textContent = item.t;
  document.getElementById("btnNewTab").dataset.url = item.u;

  // Hide all cached iframes
  Object.keys(_iframeCache).forEach(function(k) {
    _iframeCache[k].iframe.style.display = "none";
  });

  if (item.type === "notion") {
    _activeIframeKey = null;
    previewLoading.style.display = "none";
    previewEmpty.style.display = "flex";
    previewEmpty.innerHTML =
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h5M8 16h8"/></svg>' +
      '<div class="preview-empty-text">Notion \uD398\uC774\uC9C0\uB294 \uBBF8\uB9AC\uBCF4\uAE30\uAC00 \uC9C0\uC6D0\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4</div>' +
      '<div class="preview-empty-sub" style="margin-top:12px">' +
      '<button class="preview-btn btn-newtab" onclick="window.open(\'' + item.u + '\',\'_blank\')" style="font-size:13px;padding:8px 16px">' +
      '\u2197 Notion\uC5D0\uC11C \uC5F4\uAE30</button></div>';
  } else {
    _activeIframeKey = key;
    var entry = _getOrCreateIframe(key, item.u);
    entry.iframe.style.display = "block";

    // Show spinner only if not yet loaded
    if (entry.loaded) {
      previewLoading.style.display = "none";
    } else {
      previewLoading.style.display = "flex";
    }
  }
}

// ===== Hover preload (start loading before click) =====
var _hoverTimer = null;
function preloadItem(key, item) {
  if (item.type === "notion" || _iframeCache[key]) return;
  _hoverTimer = setTimeout(function() {
    _getOrCreateIframe(key, item.u);  // Silent preload
  }, 300);  // 300ms hover delay
}
function cancelPreload() {
  clearTimeout(_hoverTimer);
}

// Convert Looker Studio URLs to embed format for iframe
function toEmbedUrl(url) {
  // https://lookerstudio.google.com/reporting/... → .../embed/reporting/...
  // https://lookerstudio.google.com/u/0/reporting/... → .../embed/reporting/...
  return url.replace(
    /^(https:\/\/lookerstudio\.google\.com)(?:\/u\/\d+)?\/(reporting\/)/,
    "$1/embed/$2"
  );
}

// ===== Init =====
renderItems();

// Auto-select first item + preload top dashboards
var firstCat = catNames[0];
var firstSec = Object.keys(DATA[firstCat])[0];
var firstItem = DATA[firstCat][firstSec][0];
if (firstItem) {
  var firstKey = firstCat + "|" + firstSec + "|" + firstItem.t;
  activeItemKey = firstKey;
  renderItems();
  selectItem(firstKey, firstItem);
}

// Background preload: first dashboard of each category (staggered to avoid network congestion)
setTimeout(function() {
  var preloadCount = 0;
  catNames.forEach(function(cat, idx) {
    var secs = Object.keys(DATA[cat]);
    for (var s = 0; s < secs.length && preloadCount < 5; s++) {
      var items = DATA[cat][secs[s]];
      for (var i = 0; i < items.length && preloadCount < 5; i++) {
        var it = items[i];
        if (it.type === "notion") continue;
        var k = cat + "|" + secs[s] + "|" + it.t;
        if (!_iframeCache[k]) {
          (function(key, url) {
            setTimeout(function() { _getOrCreateIframe(key, url); }, preloadCount * 2000);
          })(k, it.u);
          preloadCount++;
        }
      }
    }
  });
}, 1000);
</script>
